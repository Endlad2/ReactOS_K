name: Linux Build (RosBE on Ubuntu 20.04)

on:
  workflow_dispatch:
    inputs:
      ARCH:
        description: 'Target architecture (i386 or amd64)'
        required: true
        default: 'i386'
      build_type:
        description: 'Build type (all, bootcd, livecd, hybridcd)'
        required: true
        default: 'livecd'

jobs:
  build-linux:
    # Используем Ubuntu 20.04, так как только для нее есть пакеты в PPA
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install RosBE from PPA
        run: |
          # Добавляем PPA и устанавливаем RosBE
          sudo add-apt-repository ppa:reactos/rosbe-unix -y
          sudo apt-get update
        
          # Устанавливаем RosBE (пакет может называться по-другому, проверим)
          # Сначала попробуем найти доступные пакеты
          apt-cache search rosbe
          
          # Устанавливаем основную среду
          sudo apt-get install -y rosbe-unix
          
          # Проверяем установку
          echo "RosBE installed. Contents of /usr/local/RosBE:"
          ls -la /usr/local/RosBE/ || echo "Directory not found, trying alternative location..."
          ls -la /usr/local/bin/ | grep rosbe || true

      - name: Configure
        run: |
          # Активируем окружение RosBE (путь может отличаться)
          if [ -f "/usr/local/RosBE/RosBE.sh" ]; then
            source /usr/local/RosBE/RosBE.sh
          elif [ -f "/usr/local/bin/rosbe" ]; then
            # Альтернативный способ активации
            source /usr/local/bin/rosbe
          else
            echo "RosBE not found in standard locations!"
            exit 1
          fi
          
          # Запускаем configure
          echo "Running configure.cmd for ARCH=${{ github.event.inputs.ARCH }}..."
          ./configure.cmd -DARCH=${{ github.event.inputs.ARCH }}

      - name: List files in output directory before build
        run: |
          OUTPUT_DIR="output-MinGW-${{ github.event.inputs.ARCH }}"
          if [ -d "$OUTPUT_DIR" ]; then
            echo "Files in $OUTPUT_DIR BEFORE build:"
            find "$OUTPUT_DIR" -type f | sort | head -20
            echo "... and more files (total: $(find "$OUTPUT_DIR" -type f | wc -l))"
          else
            echo "Output directory $OUTPUT_DIR does not exist yet."
          fi

      - name: Build
        run: |
          # Активируем окружение RosBE
          if [ -f "/usr/local/RosBE/RosBE.sh" ]; then
            source /usr/local/RosBE/RosBE.sh
          elif [ -f "/usr/local/bin/rosbe" ]; then
            source /usr/local/bin/rosbe
          fi
          
          # Переходим в директорию сборки и запускаем ninja
          cd "output-MinGW-${{ github.event.inputs.ARCH }}"
          echo "Running ninja ${{ github.event.inputs.build_type }}..."
          ninja ${{ github.event.inputs.build_type }}

      - name: Prepare artifacts
        run: |
          OUTPUT_DIR="output-MinGW-${{ github.event.inputs.ARCH }}"
          ARTIFACT_DIR="${{ runner.temp }}/artifacts"
          
          mkdir -p "$ARTIFACT_DIR"
          
          if [ -d "$OUTPUT_DIR" ]; then
            echo "Copying build artifacts from $OUTPUT_DIR..."
            cp -r "$OUTPUT_DIR"/* "$ARTIFACT_DIR"/ 2>/dev/null || true
            
            echo "Artifacts prepared. Contents:"
            ls -la "$ARTIFACT_DIR"/
          else
            echo "Warning: Output directory $OUTPUT_DIR not found!"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reactos-${{ github.event.inputs.ARCH }}-${{ github.event.inputs.build_type }}-linux
          path: ${{ runner.temp }}/artifacts/
          if-no-files-found: warn
