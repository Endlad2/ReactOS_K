name: Linux Build (RosBE with screen)

on:
  workflow_dispatch:
    inputs:
      ARCH:
        description: 'Target architecture (i386 or amd64)'
        required: true
        default: 'i386'
      build_type:
        description: 'Build type (all, bootcd, livecd, hybridcd)'
        required: true
        default: 'livecd'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget screen cmake ninja-build

      - name: Download and extract RosBE
        run: |
          wget -O RosBE-Unix-2.2.1.tar.bz2 http://s1336771.smrtp.ru/RosBE-Unix-2.2.1.tar.bz2
          tar -xjf RosBE-Unix-2.2.1.tar.bz2
          echo "RosBE extracted to: $(pwd)/RosBE-Unix-2.2.1"

      - name: Install RosBE using builder script
        run: |
          cd RosBE-Unix-2.2.1
          chmod +x RosBE-Builder.sh
          # Запускаем установку (ждем завершения)
          sudo ./RosBE-Builder.sh
          echo "RosBE installation completed."

      - name: Start screen session and run configure
        run: |
          # Создаем отдельную screen сессию и выполняем настройку
          screen -dms rosbe_session bash -c "
            source /usr/local/RosBE/RosBE.sh;
            cd $GITHUB_WORKSPACE;
            echo 'Running configure for ARCH=${{ github.event.inputs.ARCH }}...';
            ./configure.cmd -DARCH=${{ github.event.inputs.ARCH }};
            echo 'Configure finished.';
            exec bash
          "
          # Даем время на инициализацию
          sleep 5
          echo "Screen session 'rosbe_session' created and configure started."

      - name: List files before build
        run: |
          OUTPUT_DIR="output-MinGW-${{ github.event.inputs.ARCH }}"
          if [ -d "$OUTPUT_DIR" ]; then
            echo "Files in $OUTPUT_DIR BEFORE build:"
            find "$OUTPUT_DIR" -type f | head -20
          else
            echo "Directory $OUTPUT_DIR not created yet by configure."
          fi

      - name: Run build in screen session
        run: |
          # Выполняем команду сборки внутри той же screen сессии
          screen -S rosbe_session -X stuff "cd output-MinGW-${{ github.event.inputs.ARCH }}^M"
          screen -S rosbe_session -X stuff "ninja ${{ github.event.inputs.build_type }}^M"
          echo "Build command sent to screen session."

      - name: Wait for build to complete
        run: |
          echo "Waiting for build to finish (this may take a while)..."
          # Ждем, пока screen сессия не завершит выполнение (простой способ)
          while screen -list | grep -q "rosbe_session"; do
            sleep 60
            echo "Still building..."
          done
          echo "Build completed. Screen session ended."

      - name: List build results
        run: |
          OUTPUT_DIR="output-MinGW-${{ github.event.inputs.ARCH }}"
          echo "Build results in $OUTPUT_DIR:"
          ls -la "$OUTPUT_DIR"/
          # Ищем ISO
          find "$OUTPUT_DIR" -name "*.iso" -ls

      - name: Prepare artifacts
        run: |
          OUTPUT_DIR="output-MinGW-${{ github.event.inputs.ARCH }}"
          ARTIFACT_DIR="${{ runner.temp }}/artifacts"
          mkdir -p "$ARTIFACT_DIR"
          
          if [ -d "$OUTPUT_DIR" ]; then
            cp -r "$OUTPUT_DIR"/* "$ARTIFACT_DIR"/ 2>/dev/null || true
            echo "Artifacts copied."
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reactos-${{ github.event.inputs.ARCH }}-${{ github.event.inputs.build_type }}-linux-screen
          path: ${{ runner.temp }}/artifacts/
