name: Linux Build (RosBE)

on:
  workflow_dispatch:
    inputs:
      ARCH:
        description: 'Target architecture (i386 or amd64)'
        required: true
        default: 'i386'
      build_type:
        description: 'Build type (all, bootcd, livecd, hybridcd)'
        required: true
        default: 'livecd'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget screen cmake ninja-build

      - name: Download and extract RosBE
        run: |
          wget -O RosBE-Unix-2.2.1.tar.bz2 http://s1336771.smrtp.ru/RosBE-Unix-2.2.1.tar.bz2
          tar -xjf RosBE-Unix-2.2.1.tar.bz2
          echo "RosBE extracted to: $(pwd)/RosBE-Unix-2.2.1"

      - name: Install RosBE using builder script
        run: |
          cd RosBE-Unix-2.2.1
          chmod +x RosBE-Builder.sh
          # Автоматический ответ на запросы (принимаем путь по умолчанию)
          echo | sudo ./RosBE-Builder.sh
          echo "RosBE installation completed."

      - name: Configure and build in screen session
        run: |
          ARCH="${{ github.event.inputs.ARCH }}"
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          
          # Создаем screen сессию и выполняем все команды последовательно
          screen -dmS rosbe_session bash -c "
            source /usr/local/RosBE/RosBE.sh;
            cd $GITHUB_WORKSPACE;
            
            echo '=== Running configure for ARCH='\$ARCH'... ===';
            ./configure.cmd -DARCH=\$ARCH;
            
            if [ \$? -eq 0 ]; then
              echo '=== Configure successful, starting build... ===';
              cd output-MinGW-\$ARCH;
              ninja \$BUILD_TYPE;
              
              if [ \$? -eq 0 ]; then
                echo '=== Build completed successfully! ===';
              else
                echo '=== Build failed! ===';
                exit 1;
              fi
            else
              echo '=== Configure failed! ===';
              exit 1;
            fi
            
            # Держим сессию открытой для просмотра результатов
            exec bash
          "
          
          echo "Screen session 'rosbe_session' created with configure and build commands."

      - name: Monitor build progress
        run: |
          echo "Monitoring build progress (updates every 30 seconds)..."
          echo "To view full logs, check the 'Attach to screen session' step if build fails."
          
          # Отслеживаем прогресс сборки
          while screen -list | grep -q "rosbe_session"; do
            # Показываем последние строки из screen-лога (если доступно)
            if [ -f "screenlog.0" ]; then
              echo "=== Last 5 lines of build log ==="
              tail -5 screenlog.0
            fi
            sleep 30
          done
          
          # Проверяем результат сборки по наличию ISO
          OUTPUT_DIR="output-MinGW-${{ github.event.inputs.ARCH }}"
          if [ -d "$OUTPUT_DIR" ] && find "$OUTPUT_DIR" -name "*.iso" | grep -q .; then
            echo "Build completed successfully! ISO files found."
            exit 0
          else
            echo "Build failed or no ISO files produced!"
            exit 1
          fi

      - name: Attach to screen session (if build failed)
        if: failure()
        run: |
          echo "=== Build failed. Attaching to screen session for debugging ==="
          screen -r rosbe_session || echo "Screen session already ended or not accessible"

      - name: List build results
        if: always()
        run: |
          OUTPUT_DIR="output-MinGW-${{ github.event.inputs.ARCH }}"
          if [ -d "$OUTPUT_DIR" ]; then
            echo "=== Build results in $OUTPUT_DIR ==="
            ls -la "$OUTPUT_DIR"/
            echo "=== ISO files found ==="
            find "$OUTPUT_DIR" -name "*.iso" -ls
          else
            echo "Output directory $OUTPUT_DIR not found!"
          fi

      - name: Prepare artifacts
        if: always()
        run: |
          OUTPUT_DIR="output-MinGW-${{ github.event.inputs.ARCH }}"
          ARTIFACT_DIR="${{ runner.temp }}/artifacts"
          mkdir -p "$ARTIFACT_DIR"
          
          if [ -d "$OUTPUT_DIR" ]; then
            # Копируем ISO файлы
            find "$OUTPUT_DIR" -name "*.iso" -exec cp {} "$ARTIFACT_DIR"/ \;
            
            # Также копируем логи сборки, если есть
            if [ -f "screenlog.0" ]; then
              cp screenlog.0 "$ARTIFACT_DIR"/build_log.txt
            fi
            
            echo "Artifacts prepared in $ARTIFACT_DIR"
            ls -la "$ARTIFACT_DIR"/
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reactos-${{ github.event.inputs.ARCH }}-${{ github.event.inputs.build_type }}
          path: ${{ runner.temp }}/artifacts/
