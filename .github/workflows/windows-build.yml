name: VS 2019 Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'Release'
        type: string
      
      target:
        description: 'Build Target'
        required: true
        default: 'all'
        type: string
      
      arch:
        description: 'Architecture'
        required: true
        default: 'x64'
        type: string

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Validate inputs
      shell: pwsh
      run: |
        # Простая валидация параметров
        $validBuildTypes = @('Debug', 'Release', 'RelWithDebInfo', 'MinSizeRel')
        $validArchs = @('x86', 'x64', 'ARM', 'ARM64')
        
        if ($validBuildTypes -notcontains '${{ github.event.inputs.build_type }}') {
          Write-Error "Invalid build_type. Must be one of: $($validBuildTypes -join ', ')"
          exit 1
        }
        
        if ($validArchs -notcontains '${{ github.event.inputs.arch }}') {
          Write-Error "Invalid arch. Must be one of: $($validArchs -join ', ')"
          exit 1
        }
    
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Configure and Build
      shell: cmd
      run: |
        @echo off
        echo ========================================
        echo Build parameters:
        echo Build Type: ${{ github.event.inputs.build_type }}
        echo Target: ${{ github.event.inputs.target }}
        echo Arch: ${{ github.event.inputs.arch }}
        echo ========================================
        

        call "C:\Program Files\Microsoft Visual Studio\2019\Enterprise\Common7\Tools\VsDevCmd.bat"
        
        if %ERRORLEVEL% neq 0 (
          echo Failed to initialize VS 2019
          exit /b %ERRORLEVEL%
        )
        

        echo Running configure...
        call configure.bat -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type }} -DARCH=${{ github.event.inputs.arch }}
        
        if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
        

        for /d %%i in (output*) do (
          echo Found output folder: %%i
          cd %%i
          goto :build
        )
        
        echo No output folder found!
        dir
        exit /b 1
        
        :build
        echo Building in %CD%
        ninja ${{ github.event.inputs.target }}
        
        if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
        
        echo Build successful!
