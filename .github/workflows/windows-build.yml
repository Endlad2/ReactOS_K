name: VS 2019 Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'Release'
        type: string
      
      target:
        description: 'Build Target'
        required: true
        default: 'all'
        type: string
      
      arch:
        description: 'Architecture'
        required: true
        default: 'x64'
        type: string

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup Visual Studio 2019 environment
      uses: microsoft/setup-msbuild@v1
      with:
        vs-version: '16.0'
    
    - name: Add Ninja to PATH
      shell: pwsh
      run: |
        # Ninja обычно уже установлен, но добавим в PATH если нужно
        echo "C:\Program Files\Ninja" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    
    - name: Configure and Build
      shell: cmd
      run: |
        @echo off
        echo ========================================
        echo Build parameters:
        echo Build Type: ${{ github.event.inputs.build_type }}
        echo Target: ${{ github.event.inputs.target }}
        echo Arch: ${{ github.event.inputs.arch }}
        echo ========================================
        
        REM VS 2019 уже должен быть в PATH после setup-msbuild
        echo Checking MSBuild availability:
        where msbuild
        echo.
        
        REM Запускаем configure.bat
        echo Running configure.bat...
        call configure.bat -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type }} -DARCH=${{ github.event.inputs.arch }}
        
        if %ERRORLEVEL% neq 0 (
          echo Configure failed with error level: %ERRORLEVEL%
          exit /b %ERRORLEVEL%
        )
        
        REM Ищем папку output*
        echo Looking for output* folder...
        dir output* 2>nul
        
        for /d %%i in (output*) do (
          echo Found output folder: %%i
          cd %%i
          goto :build
        )
        
        echo Error: No output* folder found!
        echo Current directory contents:
        dir
        exit /b 1
        
        :build
        echo Now in: %CD%
        
        REM Выполняем ninja
        echo Running ninja ${{ github.event.inputs.target }}
        ninja ${{ github.event.inputs.target }}
        
        if %ERRORLEVEL% neq 0 (
          echo Ninja build failed with error level: %ERRORLEVEL%
          exit /b %ERRORLEVEL%
        )
        
        echo Build completed successfully!
