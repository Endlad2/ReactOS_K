name: VS 2019 Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'Release'
        type: string
      target:
        description: 'Build Target'
        required: true
        default: 'all'
        type: string
      arch:
        description: 'Architecture'
        required: true
        default: 'x64'
        type: string

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Find VS 2019 path
      shell: pwsh
      run: |
        # Поиск всех установленных версий VS
        $vsWhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
        if (Test-Path $vsWhere) {
          $vs2019 = & $vsWhere -version "[16.0,17.0)" -property installationPath
          echo "VS 2019 found at: $vs2019"
          echo "VS2019_PATH=$vs2019" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } else {
          Write-Error "vswhere not found"
          exit 1
        }
    
    - name: Run in VS 2019 Command Prompt
      shell: cmd
      run: |
        @echo off
        echo ========================================
        echo Build parameters:
        echo Build Type: ${{ github.event.inputs.build_type }}
        echo Target: ${{ github.event.inputs.target }}
        echo Arch: ${{ github.event.inputs.arch }}
        echo ========================================
        
        echo Setting up Visual Studio 2019 Command Prompt...
        echo VS2019_PATH = %VS2019_PATH%
        
        REM Создаем временный batch файл с командами
        set "TEMP_SCRIPT=%TEMP%\build_script.bat"
        
        (
          echo @echo off
          echo echo ========================================
          echo echo Inside VS 2019 Command Prompt
          echo echo ========================================
          echo echo.
          echo echo Current directory: %%CD%%
          echo echo.
          echo echo Running configure.cmd...
          echo call configure.cmd -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type }} -DARCH=${{ github.event.inputs.arch }}
          echo.
          echo if %%ERRORLEVEL%% neq 0 ^(
          echo   echo Configure failed with error level: %%ERRORLEVEL%%
          echo   exit /b %%ERRORLEVEL%%
          echo ^)
          echo.
          echo echo Looking for output* folder...
          echo dir output* 2^>nul
          echo.
          echo for /d %%%%i in ^(output*^) do ^(
          echo   echo Found output folder: %%%%i
          echo   cd %%%%i
          echo   goto :build
          echo ^)
          echo.
          echo echo Error: No output* folder found!
          echo dir
          echo exit /b 1
          echo.
          echo :build
          echo echo Now in: %%CD%%
          echo echo.
          echo echo Running ninja ${{ github.event.inputs.target }}
          echo ninja ${{ github.event.inputs.target }}
          echo.
          echo if %%ERRORLEVEL%% neq 0 ^(
          echo   echo Ninja build failed with error level: %%ERRORLEVEL%%
          echo   exit /b %%ERRORLEVEL%%
          echo ^)
          echo.
          echo echo Build completed successfully!
        ) > "%TEMP_SCRIPT%"
        
        echo Temporary script created: %TEMP_SCRIPT%
        echo.
        
        REM Запускаем VS 2019 Command Prompt используя найденный путь
        echo Launching VS 2019 Command Prompt from %VS2019_PATH%...
        
        if exist "%VS2019_PATH%\VC\Auxiliary\Build\vcvars64.bat" (
          call "%VS2019_PATH%\VC\Auxiliary\Build\vcvars64.bat"
        ) else if exist "%VS2019_PATH%\Common7\Tools\VsDevCmd.bat" (
          call "%VS2019_PATH%\Common7\Tools\VsDevCmd.bat"
        ) else (
          echo Cannot find vcvars or VsDevCmd in %VS2019_PATH%
          dir "%VS2019_PATH%\VC\Auxiliary\Build" 2>nul
          dir "%VS2019_PATH%\Common7\Tools" 2>nul
          exit /b 1
        )
        
        if %ERRORLEVEL% neq 0 (
          echo Failed to initialize VS 2019 environment
          exit /b %ERRORLEVEL%
        )
        
        echo VS 2019 Command Prompt initialized successfully
        echo.
        
        REM Выполняем наш скрипт
        call "%TEMP_SCRIPT%"
        
        set "BUILD_RESULT=%ERRORLEVEL%"
        
        REM Чистим временный файл
        del "%TEMP_SCRIPT%" 2>nul
        
        exit /b %BUILD_RESULT%
